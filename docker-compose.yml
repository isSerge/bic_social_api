services:

  # ── Infrastructure ───────────────────────────────────────────────────────────

  postgres-primary:
    image: bitnami/postgresql:16
    environment:
      POSTGRESQL_REPLICATION_MODE: master
      POSTGRESQL_REPLICATION_USER: replicator
      POSTGRESQL_REPLICATION_PASSWORD: replicator_password
      POSTGRESQL_USERNAME: social
      POSTGRESQL_PASSWORD: social_password
      POSTGRESQL_DATABASE: social_api
    volumes:
      - postgres-primary-data:/bitnami/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U social -d social_api"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  postgres-replica:
    image: bitnami/postgresql:16
    environment:
      POSTGRESQL_REPLICATION_MODE: slave
      POSTGRESQL_MASTER_HOST: postgres-primary
      POSTGRESQL_MASTER_PORT_NUMBER: 5432
      POSTGRESQL_REPLICATION_USER: replicator
      POSTGRESQL_REPLICATION_PASSWORD: replicator_password
      POSTGRESQL_USERNAME: social
      POSTGRESQL_PASSWORD: social_password
      POSTGRESQL_DATABASE: social_api
    volumes:
      - postgres-replica-data:/bitnami/postgresql
    depends_on:
      postgres-primary:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U social -d social_api"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  # ── Mock external services ───────────────────────────────────────────────────

  mock-profile-api:
    build:
      context: .
      dockerfile: Dockerfile.mocks
    command: ["/usr/local/bin/mock_profile_api"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8084/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  mock-content-api:
    build:
      context: .
      dockerfile: Dockerfile.mocks
    command: ["/usr/local/bin/mock_content_api"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  # ── Application ──────────────────────────────────────────────────────────────

  social-api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://social:social_password@postgres-primary:5432/social_api
      READ_DATABASE_URL: postgres://social:social_password@postgres-replica:5432/social_api
      REDIS_URL: redis://redis:6379
      HTTP_PORT: "8080"
      PROFILE_API_URL: http://mock-profile-api:8084
      CONTENT_API_POST_URL: http://mock-content-api:8081
      CONTENT_API_BONUS_HUNTER_URL: http://mock-content-api:8081
      CONTENT_API_TOP_PICKS_URL: http://mock-content-api:8081
    depends_on:
      postgres-primary:
        condition: service_healthy
      postgres-replica:
        condition: service_healthy
      redis:
        condition: service_healthy
      mock-profile-api:
        condition: service_healthy
      mock-content-api:
        condition: service_healthy

# ── Named volumes ────────────────────────────────────────────────────────────

volumes:
  postgres-primary-data:
  postgres-replica-data:
  redis-data:
